# MLX QLoRA 訓練設定（mlx-lm 0.29.x，欄位名以 mlx_lm.lora --help 為準）
model: "mlx-community/Qwen3-4B-Instruct-2507-4bit"
train: true
fine_tune_type: lora
data: "data/processed"
seed: 42
num_layers: 16
batch_size: 1
grad_accumulation_steps: 4   # 等效 batch 4（spec：batch 1 + accum 4）
iters: 600
val_batches: -1              # 每次驗證用全部 20 筆 valid
learning_rate: 1.0e-5
steps_per_report: 10
steps_per_eval: 50
adapter_path: "adapters"
save_every: 100
max_seq_length: 4096
grad_checkpoint: true
# mask_prompt 勿開：mlx-lm 0.29.1 對 chat 資料集的 prompt 遮罩對位有誤，
# val loss 假性下降但生成逐步退化（iter 300 空輸出、iter 600 <tool_call> 迴圈），已實測驗證。
lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.k_proj", "self_attn.v_proj", "self_attn.o_proj"]
  rank: 16
  scale: 2.0
  dropout: 0.05
